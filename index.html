
    <!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和纏祭 公式お知らせ</title>
    <style>
        #public-notices { max-width: 800px; margin: 0 auto; padding: 20px; font-family: sans-serif; }
        .notice-card { background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; border-left: 5px solid #3498db; }
        .notice-card.important { border-left-color: #e74c3c; background: #fffdfd; }
        .notice-header { display: flex; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .badge-important { background-color: #e74c3c; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .notice-date { color: #7f8c8d; font-size: 14px; }
        .notice-title { font-size: 20px; margin: 0; font-weight: bold; line-height: 1.4; }
        .notice-body { font-size: 16px; line-height: 1.6; color: #333; margin-bottom: 20px; white-space: pre-wrap; }
        
        .notice-images { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .notice-images img { max-width: 100%; height: auto; border-radius: 4px; border: 1px solid #ddd; max-height: 400px; object-fit: contain; }
        
        .notice-pdfs { display: flex; flex-direction: column; gap: 8px; }
        .pdf-link { display: inline-flex; align-items: center; padding: 10px 15px; background-color: #ecf0f1; color: #2c3e50; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.2s; border: 1px solid #bdc3c7; width: fit-content; }
        .pdf-link:hover { background-color: #bdc3c7; }
        .empty-msg { text-align: center; color: #7f8c8d; padding: 30px; }
    </style>
</head>
<body>

    <div id="public-notices">
        <h2 style="border-bottom: 2px solid #2c3e50; padding-bottom: 10px;">📌 最新のお知らせ</h2>
        <div id="notices-container"><p class="empty-msg">読み込み中...</p></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script>
        // ★★★ Firebaseの鍵を貼り付けてください ★★★
         const firebaseConfig = {
    apiKey: "AIzaSyD69OZD1USbhG4ndQZPdv5CpUZwXL5pRmQ",
    authDomain: "watensai-portal.firebaseapp.com",
    projectId: "watensai-portal",
    storageBucket: "watensai-portal.firebasestorage.app",
    messagingSenderId: "332659532540",
    appId: "1:332659532540:web:8c1e07bf16b78d4bf5ed79",
    measurementId: "G-NV3R12J12R"
  };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function loadPublicNotices() {
            db.collection("notices_permanent").orderBy("createdAt", "desc").onSnapshot((querySnapshot) => {
                const container = document.getElementById('notices-container');
                container.innerHTML = "";
                const now = new Date();
                let displayCount = 0;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    let isVisible = true;
                    if (data.publishStartDate && new Date(data.publishStartDate) > now) isVisible = false;
                    if (data.publishEndDate && new Date(data.publishEndDate) < now) isVisible = false;
                    if (!isVisible) return;
                    displayCount++;

                    const article = document.createElement('div');
                    article.className = data.isImportant ? 'notice-card important' : 'notice-card';

                    let headerHTML = `<div class="notice-header">`;
                    if (data.isImportant) headerHTML += `<span class="badge-important">重要</span>`;
                    
                    let dateStr = "";
                    if (data.publishStartDate) {
                        const d = new Date(data.publishStartDate); dateStr = `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`;
                    } else if (data.createdAt) {
                        const d = data.createdAt.toDate(); dateStr = `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`;
                    }
                    headerHTML += `<span class="notice-date">${dateStr}</span></div>`;

                    const titleHTML = `<h3 class="notice-title" style="color: ${data.textColor || '#000000'};">${data.title}</h3>`;
                    const safeBodyText = document.createElement('div'); safeBodyText.innerText = data.body; 
                    const bodyHTML = `<div class="notice-body">${safeBodyText.innerHTML}</div>`;

                    // ★大改修：画像をDriveの埋め込み専用URL（thumbnail）に自動変換する処理
                    let imagesHTML = "";
                    if (data.images && data.images.length > 0) {
                        imagesHTML += `<div class="notice-images">`;
                        data.images.forEach(imgUrl => {
                            let viewUrl = imgUrl;
                            const match = imgUrl.match(/id=([^&]+)/);
                            if (match) {
                                viewUrl = `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1000`;
                            }
                            imagesHTML += `<img src="${viewUrl}" alt="お知らせ画像" loading="lazy">`;
                        });
                        imagesHTML += `</div>`;
                    }

                    let pdfsHTML = "";
                    if (data.pdfs && data.pdfs.length > 0) {
                        pdfsHTML += `<div class="notice-pdfs">`;
                        data.pdfs.forEach((pdfUrl, index) => {
                            pdfsHTML += `<a href="${pdfUrl}" target="_blank" rel="noopener noreferrer" class="pdf-link">📄 添付ファイル ${index + 1} を開く (PDF)</a>`;
                        });
                        pdfsHTML += `</div>`;
                    }

                    article.innerHTML = headerHTML + titleHTML + bodyHTML + imagesHTML + pdfsHTML;
                    container.appendChild(article);
                });

                if (displayCount === 0) container.innerHTML = `<p class="empty-msg">現在、お知らせはありません。</p>`;
            });
        }
        loadPublicNotices();
    </script>
</body>
</html>
