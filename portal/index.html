<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>和纏祭 局員ポータル</title>
  <link type="text/css" rel="stylesheet" href="https://www.gstatic.com/firebasejs/ui/6.1.0/firebase-ui-auth.css" />
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #f5f5f5; }
    .portal-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
  </style>
</head>
<body>

  <div class="portal-box">
    <h2>和纏祭 局員ポータル</h2>
    <p>管理システムにログインしてください</p>
    
    <div id="firebaseui-auth-container"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/ui/6.1.0/firebase-ui-auth.js"></script>

  <script>
    // ★★★ここに先ほどFirebaseで取得した鍵（firebaseConfig）を貼り付けます★★★
   const firebaseConfig = {
    apiKey: "AIzaSyD69OZD1USbhG4ndQZPdv5CpUZwXL5pRmQ",
    authDomain: "watensai-portal.firebaseapp.com",
    projectId: "watensai-portal",
    storageBucket: "watensai-portal.firebasestorage.app",
    messagingSenderId: "332659532540",
    appId: "1:332659532540:web:8c1e07bf16b78d4bf5ed79",
    measurementId: "G-NV3R12J12R"
  };

    // Firebaseの起動
    firebase.initializeApp(firebaseConfig);

    // ログイン画面（FirebaseUI）の設定
    var uiConfig = {
      callbacks: {
        signInSuccessWithAuthResult: function(authResult, redirectUrl) {
        // ログイン成功時にダッシュボードへ移動する
        window.location.replace('notice-permanent.html');
        return false;
      }
      },
      signInFlow: 'popup', // ポップアップ画面でログインさせる
      signInOptions: [
        firebase.auth.GoogleAuthProvider.PROVIDER_ID, // Googleログインボタン
        firebase.auth.EmailAuthProvider.PROVIDER_ID   // メアド・パスワードボタン
      ]
    };

    // 画面にログインボタンを描画する
    var ui = new firebaseui.auth.AuthUI(firebase.auth());
    ui.start('#firebaseui-auth-container', uiConfig);
  </script>

</body>
</html>
