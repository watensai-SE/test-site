<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>協賛企業管理 | 和纏祭ポータル</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div id="auth-guard" style="position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display: flex; justify-content: center; align-items: center;"><h2>認証情報を確認中...</h2></div>
    <div id="pending-screen"><h1>⏳ 承認待ちです</h1><p>管理者による確認待ち状態です。</p><button class="logout-btn" style="width: 200px; border-radius: 5px;" onclick="firebase.auth().signOut()">ログアウトして戻る</button></div>
    <div id="rejected-screen"><h1 style="color: #e74c3c;">🚫 アクセスが拒否されました</h1><p>このアカウントからの参加申請は拒否されました。</p><button class="logout-btn" style="width: 200px; border-radius: 5px;" onclick="firebase.auth().signOut()">ログアウト</button></div>
    <div id="overlay" onclick="closeSidebarMobile()"></div>

    <div id="sidebar">
        <h2>局員ポータル</h2>
        <button class="menu-btn" onclick="window.location.href='admin.html'" id="menu-admin" style="display:none;">👑 権限管理・ログ <span id="pending-badge" class="badge">0</span></button>
        <button class="menu-btn" onclick="window.location.href='notice-permanent.html'">📌 常設サイトお知らせ</button>
        <button class="menu-btn" onclick="window.location.href='notice-yearly.html'">📅 年度別お知らせ</button>
        <button class="menu-btn active" onclick="window.location.href='sponsors.html'">🤝 協賛企業管理</button>
        <div class="spacer"></div>
        <div style="padding: 10px; font-size: 12px; color: #bdc3c7;" id="user-email"></div>
        <div style="padding: 0 10px 10px 10px; font-size: 12px; color: #f1c40f;" id="user-role-display"></div>
        <button class="logout-btn" onclick="firebase.auth().signOut()">ログアウト</button>
    </div>

    <div id="content-wrapper">
        <div id="top-header">
            <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
            <h2 id="header-title" style="margin:0; font-size: 18px; color: #2c3e50;">🤝 協賛企業 データベース</h2>
        </div>

        <div id="main-content" style="display:block;">
            <div class="form-box" style="text-align: center; padding: 50px;">
                <h2 style="color: #27ae60;">担当B区間</h2>
                <p>担当B区間</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="js/common.js"></script>
</body>
</html>
