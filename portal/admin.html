<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>権限・ログ管理 | 和纏祭ポータル</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div id="auth-guard" style="position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display: flex; justify-content: center; align-items: center;"><h2>認証情報を確認中...</h2></div>
    <div id="pending-screen"><h1>⏳ 承認待ちです</h1><p>管理者による確認待ち状態です。</p><button class="logout-btn" style="width: 200px; border-radius: 5px;" onclick="firebase.auth().signOut()">ログアウトして戻る</button></div>
    <div id="rejected-screen"><h1 style="color: #e74c3c;">🚫 アクセスが拒否されました</h1><p>このアカウントからの参加申請は拒否されました。</p><button class="logout-btn" style="width: 200px; border-radius: 5px;" onclick="firebase.auth().signOut()">ログアウト</button></div>
    <div id="overlay" onclick="closeSidebarMobile()"></div>

    <div id="sidebar">
        <h2>局員ポータル</h2>
        <button class="menu-btn active" onclick="window.location.href='admin.html'" id="menu-admin" style="display:none;">👑 権限管理・ログ <span id="pending-badge" class="badge">0</span></button>
        <button class="menu-btn" onclick="window.location.href='notice-permanent.html'">📌 常設サイトお知らせ</button>
        <button class="menu-btn" onclick="window.location.href='notice-yearly.html'">📅 年度別お知らせ</button>
        <button class="menu-btn" onclick="window.location.href='sponsors.html'">🤝 協賛企業管理</button>
        <div class="spacer"></div>
        <div style="padding: 10px; font-size: 12px; color: #bdc3c7;" id="user-email"></div>
        <div style="padding: 0 10px 10px 10px; font-size: 12px; color: #f1c40f;" id="user-role-display"></div>
        <button class="logout-btn" onclick="firebase.auth().signOut()">ログアウト</button>
    </div>

    <div id="content-wrapper">
        <div id="top-header">
            <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
            <h2 id="header-title" style="margin:0; font-size: 18px; color: #2c3e50;">👑 権限管理・システムログ</h2>
        </div>

        <div id="main-content" style="display:block;">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="submit-btn" style="background-color:#34495e;" onclick="switchAdminTab('tab-users')">👑 ユーザー管理</button>
                <button class="submit-btn" style="background-color:#34495e;" onclick="switchAdminTab('tab-logs')">📝 操作ログ</button>
            </div>

            <div id="tab-users" class="admin-tab-content" style="display:block;">
                <div class="form-box" id="pending-users-box" style="display:none; border: 2px solid #3498db;"><h3 style="color: #2980b9;">🔔 承認待ちの新規申請があります！</h3><div class="table-wrapper"><table><thead><tr><th>申請者のメールアドレス</th><th>申請日時</th><th>操作</th></tr></thead><tbody id="pending-list-body"></tbody></table></div></div>
                <div class="form-box"><h3>登録ユーザー一覧（承認済み）</h3><div class="table-wrapper"><table><thead><tr><th>メールアドレス</th><th>現在の権限</th><th>操作</th></tr></thead><tbody id="user-list-body"></tbody></table></div></div>
                <div class="form-box" style="border-left: 5px solid #7f8c8d;"><div style="display: flex; justify-content: space-between; align-items: center;"><h3 style="margin: 0; color: #333;">🚫 拒否済みユーザー（ブラックリスト）</h3><button class="toggle-btn" onclick="toggleVisibility('rejected-list-content', this)" style="margin-top:0;">👁️</button></div><div id="rejected-list-content" style="display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ccc;"><div class="table-wrapper"><table><thead><tr><th>メールアドレス</th><th>操作</th></tr></thead><tbody id="rejected-list-body"></tbody></table></div></div></div>
            </div>

            <div id="tab-logs" class="admin-tab-content" style="display:none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3 style="margin:0;">📝 システム操作ログ</h3>
                    <button class="toggle-btn" id="op-log-toggle-btn" onclick="toggleSecretLogs(this)" style="background-color: #2980b9; display: none;">👁️</button>
                </div>
                <div class="form-box"><div class="table-wrapper"><table id="log-table"><thead><tr><th>日時</th><th>実行者</th><th>操作内容</th><th id="log-delete-th" style="display:none;">削除</th></tr></thead><tbody id="operation-list-body"></tbody></table></div></div>
            </div>
        </div>
    </div>

    <div id="role-modal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center; align-items: center;">
        <div style="background: white; padding: 30px; border-radius: 8px; width: 400px; max-width: 90%;">
            <h3 id="modal-user-email-display">権限の編集</h3>
            <input type="hidden" id="modal-user-id"><input type="hidden" id="modal-user-email-hidden">
            <select id="modal-role-select"><option value="general">一般局員</option><option value="content_admin">コンテンツ管理者</option><option value="admin">管理者</option></select>
            <label style="display:flex; align-items:center; margin:10px 0;"><input type="checkbox" id="modal-is-temp" onchange="toggleDateInput()"> 期限付き</label>
            <input type="date" id="modal-expire-date" style="display:none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top:20px;">
                <button onclick="deleteUserFromModal()" style="background:#e74c3c; color:white; border:none; padding:8px 12px; border-radius:4px; cursor:pointer; font-size: 14px;">🗑️ 削除</button>
                <div><button onclick="closeRoleModal()" class="edit-btn" style="background:#95a5a6;">キャンセル</button><button onclick="saveRole()" class="submit-btn">保存</button></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="js/common.js"></script> 

    <script>
        function initPage() {
            if (currentUserRole !== "superuser" && currentUserRole !== "admin") {
                alert("アクセス権限がありません。");
                window.location.replace('notice-permanent.html');
                return;
            }
            if (currentUserRole === "superuser") {
                document.getElementById('op-log-toggle-btn').style.display = "inline-block";
                document.getElementById('log-delete-th').style.display = "table-cell";
            }
            loadUsersList();
            loadOperationLogs();
        }

        function switchAdminTab(targetId) {
            document.querySelectorAll('.admin-tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(targetId).style.display = 'block';
        }

        window.isSecretLogVisible = false; 
        window.toggleSecretLogs = function(b) { 
            window.isSecretLogVisible = !window.isSecretLogVisible; 
            document.querySelectorAll('.secret-log-row').forEach(r => { r.style.display = window.isSecretLogVisible ? 'table-row' : 'none'; }); 
            b.innerText = window.isSecretLogVisible ? "🙈" : "👁️"; 
            b.style.backgroundColor = window.isSecretLogVisible ? "#e74c3c" : "#2980b9"; 
        };

        function loadUsersList() { db.collection("users").onSnapshot((qs) => { const ta = document.getElementById('user-list-body'), tp = document.getElementById('pending-list-body'), trj = document.getElementById('rejected-list-body'); ta.innerHTML = ""; tp.innerHTML = ""; trj.innerHTML = ""; let pc = 0; qs.forEach((doc) => { const u = doc.data(); const id = doc.id; const tr = document.createElement('tr'); if (u.role === "pending") { pc++; const dt = u.createdAt ? u.createdAt.toDate().toLocaleDateString('ja-JP') : "申請中"; tr.innerHTML = `<td>${u.email}</td><td>${dt}</td><td style="white-space: nowrap;"><button class="approve-btn" onclick="approveUser('${id}', '${u.email}')">承認</button><button class="edit-btn" style="background-color: #e74c3c; margin-left: 5px;" onclick="rejectUser('${id}', '${u.email}')">拒否</button></td>`; tp.appendChild(tr); } else if (u.role === "rejected") { tr.innerHTML = `<td>${u.email}</td><td><button class="edit-btn" style="background-color: #3498db;" onclick="restoreUser('${id}', '${u.email}')">🔄 戻す</button></td>`; trj.appendChild(tr); } else { let rl = u.role; if (rl === "superuser" && currentUserRole !== "superuser") rl = "admin"; let dr = (rl === "superuser" || rl === "admin") ? "管理者" : (rl === "content_admin") ? "コンテンツ管理者" : "一般局員"; if(u.expiresAt) dr += " (期限付き)"; tr.innerHTML = `<td>${u.email}</td><td style="white-space: nowrap;">${dr}</td><td><button class="edit-btn" onclick="openRoleModal('${id}', '${rl}', '${u.email}')">編集</button></td>`; ta.appendChild(tr); } }); const b = document.getElementById('pending-badge'); const pb = document.getElementById('pending-users-box'); if (pc > 0) { b.innerText = pc; b.style.display = 'inline-block'; pb.style.display = 'block'; } else { b.style.display = 'none'; pb.style.display = 'none'; } }); }
        window.approveUser = function(uid, email) { if(confirm(email + " を承認しますか？")) { db.collection("users").doc(uid).update({ role: "general" }).then(() => { addOperationLog(email + " を承認しました"); }); } };
        window.rejectUser = function(uid, email) { if(confirm(email + " を拒否しますか？")) { db.collection("users").doc(uid).update({ role: "rejected" }).then(() => { addOperationLog(email + " を拒否しました"); }); } };
        window.restoreUser = function(uid, email) { if(confirm(email + " を承認待ちに戻しますか？")) { db.collection("users").doc(uid).update({ role: "pending" }).then(() => { addOperationLog(email + " を戻しました"); }); } };
        window.openRoleModal = function(u, r, e) { if (r === "superuser") { alert("ERR_0x001"); return; } document.getElementById('modal-user-id').value=u; document.getElementById('modal-user-email-hidden').value=e; document.getElementById('modal-user-email-display').innerText=e+"の権限"; document.getElementById('modal-role-select').value=r; document.getElementById('role-modal').style.display='flex'; }
        window.closeRoleModal = function() { document.getElementById('role-modal').style.display='none'; document.getElementById('modal-is-temp').checked=false; toggleDateInput(); document.getElementById('modal-expire-date').value=''; }
        window.toggleDateInput = function() { document.getElementById('modal-expire-date').style.display = document.getElementById('modal-is-temp').checked ? 'block' : 'none'; }

        // ★防衛ログのフォーマット修正：無機質かつ明確に
        window.saveRole = function() { const tUid = document.getElementById('modal-user-id').value, tEmail = document.getElementById('modal-user-email-hidden').value, nRole = document.getElementById('modal-role-select').value, isTemp = document.getElementById('modal-is-temp').checked, expDate = document.getElementById('modal-expire-date').value; 
            db.collection("users").doc(tUid).get().then((doc) => { 
                if (doc.data().role === "superuser") { 
                    if (currentUserRole !== "superuser") { 
                        let rJp = (nRole === "admin") ? "管理者" : (nRole === "content_admin") ? "コンテンツ管理者" : "一般局員";
                        let att = `「${rJp}」`;
                        if (isTemp && expDate) att += `(until:${expDate})`;
                        // 例: 23610109ks@stu.yamato-u.ac.jp ➡ kurato.sugita@gmail.com(S) 「管理者」 try to change
                        addOperationLog(`${currentUserEmail} ➡ ${tEmail}(S) ${att} try to change`, true, true); 
                    } 
                    alert("ERR_0x001"); 
                    closeRoleModal(); 
                    return; 
                } 
                let upData = { role: nRole }; let actTxt = `${tEmail} を ${nRole} に変更`; if (isTemp && expDate) { upData.expiresAt = expDate+"T23:59:59"; actTxt+=`(期限:${expDate})`; } else { upData.expiresAt = firebase.firestore.FieldValue.delete(); } 
                db.collection("users").doc(tUid).update(upData).then(() => { addOperationLog(actTxt); alert("更新しました"); closeRoleModal(); }); 
            }); 
        }
        
        window.deleteUserFromModal = function() { const tUid = document.getElementById('modal-user-id').value; const tEmail = document.getElementById('modal-user-email-hidden').value; 
            db.collection("users").doc(tUid).get().then((doc) => { 
                if (doc.exists && doc.data().role === "superuser") { 
                    if (currentUserRole !== "superuser") {
                        // 例: 23610109ks@stu.yamato-u.ac.jp ➡ kurato.sugita@gmail.com(S) try to delete
                        addOperationLog(`${currentUserEmail} ➡ ${tEmail}(S) try to delete`, true, true); 
                    }
                    alert("ERR_0x001"); 
                    closeRoleModal(); 
                    return; 
                } 
                if(confirm("本当に削除しますか？")) { db.collection("users").doc(tUid).delete().then(() => { addOperationLog(`${tEmail} を削除`); alert("削除しました。"); closeRoleModal(); }); } 
            }); 
        };

        function loadOperationLogs() { 
            db.collection("operation_logs").orderBy("timestamp", "desc").onSnapshot((qs) => { 
                const tb = document.getElementById('operation-list-body'); 
                tb.innerHTML=""; 
                qs.forEach((doc) => { 
                    const d = doc.data(); 
                    if (currentUserRole !== "superuser" && (d.isSecurityAlert || d.isHiddenFromAdmin)) return; 
                    const date = d.timestamp ? d.timestamp.toDate().toLocaleString('ja-JP') : "記録中..."; 
                    const tr = document.createElement('tr'); 
                    let delBtn = `<td style="display:none;"></td>`; 
                    if (currentUserRole === "superuser") delBtn = `<td><button class="edit-btn" style="background:#e74c3c;" onclick="deleteLog('${doc.id}')">削除</button></td>`; 
                    tr.innerHTML = `<td>${date}</td><td>${d.userEmail}</td><td style="${d.isSecurityAlert?'color:red;font-weight:bold;':''}">${d.action}</td>${delBtn}`; 
                    if (currentUserRole === "superuser" && (d.isSecurityAlert || d.isHiddenFromAdmin)) { 
                        tr.classList.add('secret-log-row'); 
                        tr.style.display = window.isSecretLogVisible ? 'table-row' : 'none'; 
                    } 
                    tb.appendChild(tr); 
                }); 
            }); 
        }
        window.deleteLog = function(id) { if(currentUserRole==="superuser" && confirm("削除しますか？")){ db.collection("operation_logs").doc(id).delete(); addOperationLog("ログ削除", false, true); } };
    </script>
</body>
</html>
